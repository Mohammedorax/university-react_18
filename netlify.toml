[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # نشر تجريبي: تفعيل mockApi داخل المتصفح (لا يوجد باكند بعد). إزالة أو false عند ربط API حقيقي.
  VITE_USE_MOCK_API = "true"

# SPA fallback - any route returns index.html so React Router can handle it
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-term cache for hashed build assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Service worker must not be cached aggressively (PWA auto-update)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
