version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: university_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: university
    ports:
      - "5432:5432"
    volumes:
      - university_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d university"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  university_pg_data:
