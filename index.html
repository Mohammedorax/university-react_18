<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="description" content="نظام إدارة الجامعة الشامل - إدارة الطلاب والمعلمين والموارد" />
  
  <!--
    Content Security Policy - حماية XSS
    ملاحظة: 'unsafe-inline' في style-src مطلوب لـ Tailwind/Vite runtime styles.
    script-src لا يحتاج 'unsafe-inline' (جميع السكريبتات من ملفات bundled).
    يُفضَّل تطبيق CSP عبر HTTP headers على الخادم (انظر vite.config.ts preview headers
    و netlify.toml) بدلاً من meta tag في الإنتاج.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    script-src-attr 'none';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com data:;
    img-src 'self' data: blob: https:;
    connect-src 'self' https: wss: http://localhost:* ws://localhost:*;
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';
    worker-src 'self' blob:;
    manifest-src 'self';
    media-src 'self';
    upgrade-insecure-requests;
  ">
  
  <!-- Apple Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="University App" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Favicon and Icons -->
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="/assets/icons/pwa-192x192.svg" />
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/pwa-192x192.svg" />
  <link rel="icon" type="image/svg+xml" sizes="512x512" href="/assets/icons/pwa-512x512.svg" />
  
  <title>نظام الجامعة الإلكتروني</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
